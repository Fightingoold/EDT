name: Auto-Update Planning
on:
  schedule:
    - cron: '0 5 * * *' # S'exécute tous les jours à 5h00 UTC
  workflow_dispatch: # Bouton manuel

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies and Chrome
        run: |
          npm install
          # On installe explicitement le binaire de Chrome pour Puppeteer
          npx puppeteer browsers install chrome

      - name: Run Scraper
        run: node scrap.js
        env:
          # Ces noms doivent correspondre EXACTEMENT à tes Secrets GitHub
          ADE_USER: ${{ secrets.ADE_USER }}
          ADE_PASS: ${{ secrets.ADE_PASS }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}