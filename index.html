<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MMI Dashboard | Planning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            overflow-x: hidden;
            /* Empêche le "pull-to-refresh" qui casse l'expérience app */
            overscroll-behavior-y: contain;
        }
        
        .glass { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        /* Conteneur de scroll horizontal */
        #calendar-overflow {
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch; /* Scroll fluide iOS */
            overscroll-behavior-x: contain;
            position: relative;
        }

        .calendar-wrapper {
            position: relative;
            display: flex;
            height: 850px;
        }

        /* FIX MOBILE : Empêche l'écrasement des noms */
        @media (max-width: 768px) {
            .view-week .day-column {
                min-width: 180px; /* Largeur de confort pour lire les noms */
                flex-shrink: 0;
            }
        }

        .time-gutter {
            width: 45px;
            flex-shrink: 0;
            position: sticky;
            left: 0;
            z-index: 40;
            background: #020617;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .hour-mark {
            position: absolute;
            right: 8px;
            transform: translateY(-50%);
            font-size: 0.65rem;
            color: #64748b;
            font-weight: 800;
        }

        .days-container {
            display: flex;
            flex-grow: 1;
            position: relative;
            gap: 6px;
            padding-right: 20px;
        }

        .day-column {
            flex: 1;
            position: relative;
            height: 100%;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
        }

        .grid-line {
            position: absolute;
            left: 0; right: 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            pointer-events: none;
        }

        .course-card {
            position: absolute;
            left: 4px; right: 4px;
            border-radius: 10px;
            padding: 8px;
            font-size: 0.72rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
            overflow: hidden;
            transition: transform 0.1s;
            /* Crucial pour le scroll mobile : */
            touch-action: pan-y; 
            user-select: none;
        }

        .course-card:active { transform: scale(0.97); }

        .type-tp { background: linear-gradient(135deg, #064e3b 0%, #059669 100%); border-left: 4px solid #34d399; }
        .type-td { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); border-left: 4px solid #60a5fa; }
        .type-promo { background: linear-gradient(135deg, #881337 0%, #e11d48 100%); border-left: 4px solid #fb7185; }

        .active-btn { background: #3b82f6 !important; color: white !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-2 md:p-6 view-week">

    <div class="max-w-[1400px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-2xl font-black italic tracking-tighter uppercase">MMI<span class="text-blue-500">Dash</span></h1>
            
            <div class="flex gap-2 glass p-1 rounded-xl">
                <button onclick="setView('day')" id="btn-day" class="px-5 py-2 rounded-lg text-xs font-bold uppercase transition-all">Jour</button>
                <button onclick="setView('week')" id="btn-week" class="px-5 py-2 rounded-lg text-xs font-bold uppercase transition-all active-btn">Semaine</button>
            </div>

            <div id="day-nav" class="hidden flex gap-2 overflow-x-auto no-scrollbar py-2 w-full md:w-auto justify-center"></div>
        </header>

        <div id="calendar-overflow" class="glass rounded-[2rem] p-2 md:p-4 shadow-2xl">
            <div class="calendar-wrapper">
                <div class="time-gutter" id="time-gutter"></div>
                <div class="days-container" id="days-container"></div>
            </div>
        </div>
    </div>

    <!-- Modal de détails (Popup) -->
    <div id="course-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md" onclick="closeModal()">
        <div class="glass w-full max-w-sm rounded-[2.5rem] p-8 border border-white/10 shadow-2xl" onclick="event.stopPropagation()">
            <div id="modal-type" class="inline-block px-3 py-1 rounded-full text-[10px] font-black uppercase mb-4 tracking-widest text-white"></div>
            <h2 id="modal-matiere" class="text-5xl font-black italic tracking-tighter mb-2 leading-none"></h2>
            <div id="modal-horaire" class="text-blue-400 font-bold text-lg mb-8"></div>
            
            <div class="space-y-4">
                <div class="bg-white/5 p-5 rounded-2xl border border-white/5">
                    <span class="text-[10px] uppercase text-slate-500 font-black block mb-1 tracking-widest">Enseignant</span>
                    <span id="modal-prof" class="text-xl font-semibold text-slate-100 uppercase"></span>
                </div>
                <div class="bg-white/5 p-5 rounded-2xl border border-white/5">
                    <span class="text-[10px] uppercase text-slate-500 font-black block mb-1 tracking-widest">Salle</span>
                    <span id="modal-salle" class="text-xl font-semibold text-slate-100 uppercase"></span>
                </div>
            </div>

            <button onclick="closeModal()" class="w-full mt-8 py-5 bg-white text-black rounded-2xl font-black uppercase tracking-widest transition-all active:scale-95">Fermer</button>
        </div>
    </div>

    <script>
        const jours = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi"];
        const START_H = 8;
        const END_H = 18;
        const PIXELS_PER_HOUR = 80;
        
        let currentView = 'week';
        const todayIdx = new Date().getDay() - 1;
        let currentDay = (todayIdx >= 0 && todayIdx <= 4) ? jours[todayIdx] : "Lundi";
        let planningData = [];

        async function init() {
            try {
                const res = await fetch('./planning.json');
                planningData = await res.json();
                render();
            } catch (e) { console.error("Erreur JSON"); }
        }

        function setView(v) {
            currentView = v;
            document.getElementById('btn-day').classList.toggle('active-btn', v === 'day');
            document.getElementById('btn-week').classList.toggle('active-btn', v === 'week');
            document.getElementById('day-nav').style.display = v === 'day' ? 'flex' : 'none';
            document.body.className = v === 'day' ? 'p-2 md:p-6 view-day' : 'p-2 md:p-6 view-week';
            render();
        }

        function timeToPx(timeStr) {
            const [h, m] = timeStr.split('h').map(Number);
            return ((h - START_H) * 60 + m) / 60 * PIXELS_PER_HOUR;
        }

        function showDetails(course) {
            document.getElementById('modal-matiere').innerText = course.matiere;
            document.getElementById('modal-horaire').innerText = `🕒 ${course.horaire}`;
            document.getElementById('modal-prof').innerText = course.prof;
            document.getElementById('modal-salle').innerText = course.salle;
            
            const typeEl = document.getElementById('modal-type');
            typeEl.innerText = course.type;
            const t = course.type.toLowerCase();
            typeEl.className = "inline-block px-3 py-1 rounded-full text-[10px] font-black uppercase mb-4 tracking-widest ";
            if(t.includes('tp')) typeEl.classList.add('bg-emerald-600');
            else if(t.includes('td')) typeEl.classList.add('bg-blue-600');
            else typeEl.classList.add('bg-rose-600');

            document.getElementById('course-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('course-modal').classList.add('hidden'); }

        function render() {
            const gutter = document.getElementById('time-gutter');
            const container = document.getElementById('days-container');
            const dayNav = document.getElementById('day-nav');

            let gutterHtml = '';
            for (let h = START_H; h <= END_H; h++) {
                gutterHtml += `<div class="hour-mark" style="top: ${(h - START_H) * PIXELS_PER_HOUR + 40}px">${h}h00</div>`;
            }
            gutter.innerHTML = gutterHtml;

            dayNav.innerHTML = jours.map(j => `
                <button onclick="currentDay='${j}'; render();" 
                    class="px-4 py-2 rounded-full border border-white/10 text-[10px] font-bold uppercase transition-all ${currentDay === j ? 'bg-blue-500 text-white' : 'text-white/40'}">
                    ${j}
                </button>
            `).join('');

            const displayJours = currentView === 'week' ? jours : [currentDay];
            container.innerHTML = displayJours.map(j => `
                <div class="day-column">
                    <div class="text-center text-[11px] font-black text-blue-400 uppercase py-3 sticky top-0 bg-slate-900/90 backdrop-blur-md rounded-t-lg z-20">${j}</div>
                    ${Array.from({length: END_H - START_H + 1}).map((_, i) => `<div class="grid-line" style="top: ${i * PIXELS_PER_HOUR + 40}px"></div>`).join('')}
                    <div class="relative" style="height: 100%; margin-top: 40px;">
                        ${planningData.filter(c => c.jour === j).map(c => {
                            const [start, end] = c.horaire.split(' - ');
                            const top = timeToPx(start);
                            const height = timeToPx(end) - top;
                            const tClass = c.type.toLowerCase().includes('tp') ? 'type-tp' : c.type.toLowerCase().includes('td') ? 'type-td' : 'type-promo';
                            return `
                                <div class="course-card ${tClass} cursor-pointer" 
                                     style="top: ${top}px; height: ${height}px;" 
                                     onclick='showDetails(${JSON.stringify(c).replace(/'/g, "&apos;")})'>
                                    <span class="font-black text-[0.75rem] leading-none mb-1">${c.matiere}</span>
                                    <span class="text-[0.6rem] font-bold truncate opacity-90">${c.prof}</span>
                                    <span class="mt-auto text-[0.55rem] font-black opacity-40 uppercase">${c.salle}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
